openapi: 3.1.0
info:
  title: Password Reset API
  version: 0.1.0
  description: Contract for password reset request and completion flows.
paths:
  /api/auth/password-reset/request:
    post:
      summary: Request a password reset
      operationId: requestPasswordReset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetRequest"
      responses:
        "202":
          description: Generic reset-request confirmation returned for both existing and non-existing accounts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasswordResetRequestAccepted"
        "400":
          description: Request payload failed validation
  /api/auth/password-reset/confirm:
    post:
      summary: Complete a password reset with a valid token
      operationId: confirmPasswordReset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetConfirmRequest"
      responses:
        "200":
          description: Password reset completed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasswordResetConfirmResponse"
        "400":
          description: Validation failed or the new password is not allowed
        "410":
          description: Reset token is invalid, expired, revoked, or already used
components:
  schemas:
    PasswordResetRequest:
      type: object
      additionalProperties: false
      required:
        - email
      properties:
        email:
          type: string
          format: email
    PasswordResetRequestAccepted:
      type: object
      additionalProperties: false
      required:
        - message
      properties:
        message:
          type: string
          description: Generic confirmation text that does not reveal whether the account exists.
    PasswordResetConfirmRequest:
      type: object
      additionalProperties: false
      required:
        - token
        - password
      properties:
        token:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 8
    PasswordResetConfirmResponse:
      type: object
      additionalProperties: false
      required:
        - message
      properties:
        message:
          type: string
          description: Confirmation that the password has been updated and old sessions are revoked.
