openapi: 3.1.0
info:
  title: Teams Alert Settings API
  version: 0.1.0
  description: Contract for reading and updating Microsoft Teams portfolio alert settings.
paths:
  /api/settings/teams-alert:
    get:
      summary: Read the current user's Teams alert settings
      operationId: getTeamsAlertSettings
      responses:
        "200":
          description: Current Teams alert settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamsAlertSettingsResponse"
    put:
      summary: Create or update the current user's Teams alert settings
      operationId: upsertTeamsAlertSettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamsAlertSettingsRequest"
      responses:
        "200":
          description: Updated Teams alert settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamsAlertSettingsResponse"
        "400":
          description: Validation failed
  /api/settings/teams-alert/history:
    get:
      summary: Read paged Teams alert delivery history for the current user
      operationId: getTeamsAlertDeliveryHistory
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            minimum: 1
            maximum: 25
            default: 5
      responses:
        "200":
          description: Paged Teams alert delivery history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamsAlertHistoryResponse"
components:
  schemas:
    TeamsAlertSettingsRequest:
      type: object
      additionalProperties: false
      required:
        - enabled
        - destinationLabel
        - triggerAmountUsd
        - webhookUrl
      properties:
        enabled:
          type: boolean
        destinationLabel:
          type: string
          minLength: 1
          maxLength: 120
        triggerAmountUsd:
          type: integer
          minimum: 1
          maximum: 1000000
        webhookUrl:
          type:
            - string
            - "null"
          format: uri
          description: Teams workflow webhook URL supplied by the user
    TeamsAlertSettingsResponse:
      type: object
      additionalProperties: false
      required:
        - enabled
        - destinationLabel
        - triggerAmountUsd
        - hasWebhookUrl
        - webhookUrl
        - baselineValue
        - deliveryStatus
      properties:
        enabled:
          type: boolean
        destinationLabel:
          type:
            - string
            - "null"
        triggerAmountUsd:
          type: integer
          minimum: 1
          maximum: 1000000
        hasWebhookUrl:
          type: boolean
        webhookUrl:
          type:
            - string
            - "null"
          format: uri
        baselineValue:
          type:
            - number
            - "null"
        lastEvaluatedAt:
          type:
            - string
            - "null"
          format: date-time
        lastDeliveredAt:
          type:
            - string
            - "null"
          format: date-time
        lastFailureAt:
          type:
            - string
            - "null"
          format: date-time
        lastFailureMessage:
          type:
            - string
            - "null"
        deliveryStatus:
          type: string
          enum:
            - idle
            - sent
            - failed
    TeamsAlertHistoryEntry:
      type: object
      additionalProperties: false
      required:
        - id
        - capturedAt
        - portfolioValue
        - baselineValue
        - gainAmount
        - status
        - responseCode
        - failureMessage
      properties:
        id:
          type: string
        capturedAt:
          type: string
          format: date-time
        portfolioValue:
          type: number
        baselineValue:
          type: number
        gainAmount:
          type: number
        status:
          type: string
          enum:
            - idle
            - sent
            - failed
        responseCode:
          type:
            - integer
            - "null"
        failureMessage:
          type:
            - string
            - "null"
    TeamsAlertHistoryResponse:
      type: object
      additionalProperties: false
      required:
        - items
        - page
        - pageSize
        - totalItems
        - totalPages
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/TeamsAlertHistoryEntry"
        page:
          type: integer
        pageSize:
          type: integer
        totalItems:
          type: integer
        totalPages:
          type: integer
