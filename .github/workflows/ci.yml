name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      AUTH_SECRET: ci-auth-secret
      TEAMS_WEBHOOK_ENCRYPTION_KEY: ci-teams-secret
      USE_TEST_DATABASE: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration and contract tests
        run: npm run test:integration
